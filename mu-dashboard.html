<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ Ministro della Difesa - Control Room</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ===== STILE RADAR VERDE ===== */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0a0f0c;
            color: #d0e0d0;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
        }
        .app-container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 40px);
        }
        /* Pannello sinistro */
        .battalions-panel {
            width: 340px;
            background: #111a14;
            border: 1px solid #2a4a2a;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,255,136,0.1);
        }
        .battalions-panel h2 {
            margin-top: 0;
            color: #00ff88;
            border-bottom: 1px solid #2a4a2a;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .battalion-card {
            background: #1a2a1a;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            border: 1px solid #2a5a2a;
            transition: all 0.2s;
        }
        .battalion-card:hover { border-color: #00ff88; background: #1f3a1f; }
        .battalion-card.selected { border-color: #00ff88; box-shadow: 0 0 12px #00ff8840; }
        .battalion-name {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
        }
        .battalion-stats {
            display: flex;
            gap: 15px;
            margin-top: 8px;
            font-size: 13px;
        }
        .stat { display: flex; flex-direction: column; }
        .stat-label { color: #8aaa8a; font-size: 11px; text-transform: uppercase; }
        .stat-value { color: #00ff88; font-weight: bold; font-size: 16px; }

        /* Pannello destro */
        .detail-panel {
            flex: 1;
            background: #111a14;
            border: 1px solid #2a4a2a;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 15px rgba(0,255,136,0.1);
        }
        .detail-header {
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #2a4a2a;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .detail-header h2 { margin: 0; color: #00ff88; }
        .badge {
            background: #00ff8820;
            color: #00ff88;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid #00ff8850;
        }
        button {
            background: #1e4a1e;
            border: 1px solid #00ff88;
            color: #e0ffe0;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.secondary {
            background: #1a2e1a;
            border-color: #3a6a3a;
        }
        button:hover { background: #2a6a2a; box-shadow: 0 0 8px #00ff88; }
        button.secondary:hover { background: #2a4a2a; }
        .danger-btn {
            background: none;
            border: 1px solid #ff4747;
            color: #ff8888;
        }
        .danger-btn:hover { background: #ff4747; color: black; box-shadow: 0 0 8px #ff4747; }

        input, textarea {
            background: #1a2a1a;
            border: 1px solid #2a5a2a;
            color: #e0ffe0;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
        }

        .mu-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .mu-table th, .mu-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #2a4a2a;
        }
        .mu-table th { color: #00ff88; font-size: 12px; text-transform: uppercase; }
        .clickable { cursor: pointer; }
        .clickable:hover { background: #1f3a1f; }

        .members-list {
            max-height: 300px;
            overflow-y: auto;
            background: #0f1a0f;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 13px;
        }

        .flex-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .section-title {
            font-size: 16px;
            color: #00ff88;
            margin: 20px 0 10px;
            border-bottom: 1px solid #2a4a2a;
            padding-bottom: 5px;
            text-transform: uppercase;
        }

        a {
            color: #00ff88;
            text-decoration: none;
            border-bottom: 1px dotted #00ff88;
        }
        a:hover { border-bottom: 1px solid #00ff88; }

        .loading { opacity: 0.6; pointer-events: none; }

        .members-list img, .detail-header img {
    object-fit: cover;
}
/* ===== EFFETTI CONSOLE MILITARE ===== */

/* Sfondo con griglia prospettica (pannelli) */
.battalions-panel::before,
.detail-panel::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    border-radius: inherit;
}

/* Linea di scansione orizzontale animata */
.detail-panel::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #00ff88, transparent);
    opacity: 0.4;
    box-shadow: 0 0 20px #00ff88;
    animation: scan 8s linear infinite;
    pointer-events: none;
    z-index: 1;
    border-radius: inherit;
}

@keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
}

/* Radar rotante (canvas) */
#radar-canvas {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid #00ff8840;
    box-shadow: 0 0 30px #00ff8820, inset 0 0 20px #00ff8810;
    z-index: 100;
    pointer-events: none;
    opacity: 0.7;
}

/* Effetto glitch sui titoli */
h1, h2, .section-title {
    text-shadow: 0 0 5px #00ff88, 0 0 10px #00ff88, 2px 2px 0 #000;
    position: relative;
    animation: textFlicker 3s infinite;
}

@keyframes textFlicker {
    0%, 100% { opacity: 1; }
    95% { opacity: 0.9; }
    96% { opacity: 0.5; }
    97% { opacity: 1; }
}

/* Bordi tecnologici con angoli */
.battalions-panel, .detail-panel {
    position: relative;
    overflow: hidden;
    border: 1px solid #00ff8860 !important;
    box-shadow: 0 0 20px #00ff8820, inset 0 0 30px #00ff8805 !important;
}

/* Angoli tagliati */
.battalions-panel {
    clip-path: polygon(0% 0%, calc(100% - 15px) 0%, 100% 15px, 100% 100%, 15px 100%, 0% calc(100% - 15px));
}
.detail-panel {
    clip-path: polygon(0% 0%, calc(100% - 15px) 0%, 100% 15px, 100% 100%, 15px 100%, 0% calc(100% - 15px));
}

/* Bottoni con effetto "traccia" */
button {
    position: relative;
    overflow: hidden;
}
button::after {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, #00ff8840 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
button:hover::after {
    opacity: 0.3;
}

/* Linee di separazione decorative */
.section-title {
    border-bottom: 2px solid #00ff8840 !important;
    position: relative;
}
.section-title::before {
    content: "";
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 50px;
    height: 2px;
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
}
        /* Pannello bilanciamento (destra) */
        .balance-panel {
            width: 280px;
            background: #111a14;
            border: 1px solid #2a4a2a;
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,255,136,0.1);
            position: relative;
            clip-path: polygon(0% 0%, calc(100% - 15px) 0%, 100% 15px, 100% 100%, 15px 100%, 0% calc(100% - 15px));
        }
        .balance-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            border-radius: inherit;
        }
        .balance-panel h2 {
            margin-top: 0;
            color: #00ff88;
            border-bottom: 1px solid #2a4a2a;
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }
        .balance-panel > * {
            position: relative;
            z-index: 2;
        }
        .battalion-balance-item {
            background: #1a2a1a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid #2a5a2a;
            transition: all 0.2s;
        }
        .battalion-balance-item:hover {
            border-color: #00ff88;
            background: #1f3a1f;
        }
        .battalion-balance-name {
            font-weight: bold;
            color: #ffffff;
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .battalion-balance-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
        }
        .balance-mu-list {
            margin-top: 8px;
            padding-left: 8px;
            border-left: 2px solid #2a5a2a;
            font-size: 11px;
        }
        .balance-mu-item {
            display: flex;
            justify-content: space-between;
            color: #aaccaa;
            padding: 2px 0;
        }
    </style>
</head>
<body>
    <div id="progress-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:4px; z-index:9999;">
    <div id="progress-bar" style="width:0%; height:100%; background:#00ff88; box-shadow:0 0 10px #00ff88; transition:width 0.3s;"></div>
</div>
    <canvas id="radar-canvas" width="120" height="120"></canvas>
<div class="app-container">
    <!-- PANNELLO SINISTRO: BATTAGLIONI -->
    <div class="battalions-panel">
        <h2>🛡️ Battaglioni</h2>
        <div style="margin-bottom: 15px;">
            <button id="newBattalionBtn" style="width:100%; margin-bottom:8px;">➕ Nuovo Battaglione</button>
            <button id="autoBalanceBtn" style="width:100%; background:#1a3a1a; border-color:#00ff88;">🤖 Auto-Bilancia MU</button>
        </div>
        <div id="battalionListContainer" style="flex:1;">
            <!-- Qui vengono iniettati i battaglioni -->
        </div>
        <div style="margin-top: 15px; font-size:12px; color:#6a8a6a;">
            <button id="refreshAllBtn" class="secondary" style="width:100%">🔄 Aggiorna tutti i dati</button>
        </div>
    </div>

    <!-- PANNELLO CENTRALE: DETTAGLIO BATTAGLIONE / MU -->
    <div class="detail-panel" id="detailPanel">
        <!-- Vuoto all'inizio, popolato dinamicamente -->
        <div style="text-align:center; color:#6a8a6a; padding:50px;">
            Seleziona un battaglione o creane uno nuovo
        </div>
    </div>

    <!-- PANNELLO DESTRO: BILANCIAMENTO BATTAGLIONI -->
    <div class="balance-panel">
        <h2>⚖️ Bilanciamento</h2>
        <div id="balanceListContainer" style="flex:1; overflow-y:auto;">
            <!-- Qui verranno iniettati i battaglioni ordinati per livello -->
        </div>
        <div style="margin-top:15px; font-size:11px; color:#6a8a6a; text-align:center;">
            Livello totale crescente
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- CONFIGURAZIONE ----------
        const API_BASE = 'https://api2.warera.io/trpc'; // Conferma URL corretto
        const APP_BASE = 'https://app.warera.io';

        // Stato globale
        let battalions = [];
        let selectedBattalionId = null;
        let muDataCache = new Map();        // id MU -> dati completi
        let userCache = new Map();          // userId -> { name, ... }
        let userAliasMap = new Map(); // per eventuali alias manuali
        // Elementi DOM
        const battalionListDiv = document.getElementById('battalionListContainer');
        const detailPanel = document.getElementById('detailPanel');
        const newBtn = document.getElementById('newBattalionBtn');
        const refreshAllBtn = document.getElementById('refreshAllBtn');

        // ---------- MODELLO BATTAGLIONE ----------
        function createBattalion(name, chiefUserId = '') {
            return {
                id: 'b_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                name: name,
                chiefUserId: chiefUserId,
                muIds: []
            };
        }

        // ---------- PERSISTENZA LOCALSTORAGE ----------
        function loadBattalions() {
            const stored = localStorage.getItem('warera_battalions_v2');
            if (stored) {
                try { battalions = JSON.parse(stored); } catch(e){ battalions = []; }
            } else {
                // Battaglione di esempio
                const example = createBattalion('1ª Divisione Corazzata');
                example.chiefUserId = '69696382422cd6752173a622';
                example.muIds = ['6973b4d3eed64c805d54bd07'];
                battalions = [example];
            }
        }

        function saveBattalions() {
            localStorage.setItem('warera_battalions_v2', JSON.stringify(battalions));
        }

        // ---------- API MU ----------
        async function fetchMuById(muId) {
            try {
                const response = await fetchWithRetry(`${API_BASE}/mu.getById`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ muId })
                });
                if (!response.ok) throw new Error(`Errore API per MU ${muId}: ${response.status}`);
                const json = await response.json();
                const data = json.result?.data || json;
                
                if (!data) {
                    console.warn(`MU ${muId} ha restituito dati nulli`);
                    return null;
                }
                
                if (!data.members) data.members = [];
                if (!data.rankings) data.rankings = {};
                
                console.log(`✅ MU ${muId} caricata: ${data.name || 'senza nome'}, membri: ${data.members.length}`);
                return data;
            } catch (err) {
                console.error(`❌ Errore fetch MU ${muId}:`, err);
                throw err;
            }
        }

        // ---------- API UTENTE ----------
        async function fetchUserById(userId) {
            if (typeof userAliasMap !== 'undefined' && userAliasMap.has(userId)) {
                return { name: userAliasMap.get(userId), id: userId, avatarUrl: null, level: 0 };
            }
            if (userCache.has(userId)) return userCache.get(userId);

            try {
                const response = await fetchWithRetry(`${API_BASE}/user.getUserLite`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                if (!response.ok) throw new Error(`Errore API utente ${userId}`);
                const json = await response.json();
                const data = json.result?.data || json;
                const name = data.username || data.name || `ID: ${userId.slice(-6)}`;
                const avatarUrl = data.avatarUrl || null;
                const level = data.leveling?.level || 0;
                const user = { name, id: userId, avatarUrl, level };
                userCache.set(userId, user);
                return user;
            } catch (err) {
                console.warn(`Utente ${userId} non caricato, uso fallback`, err);
                const fallback = { name: `ID: ${userId.slice(-6)}`, id: userId, avatarUrl: null, level: 0 };
                userCache.set(userId, fallback);
                return fallback;
            }
        }
       
        async function refreshAllMuData() {
            const allMuIds = new Set();
            battalions.forEach(b => b.muIds.forEach(id => allMuIds.add(id)));
            const ids = Array.from(allMuIds);
            
            if (ids.length === 0) return;
            
            showToast(`🔄 Aggiornamento ${ids.length} MU...`, 'info');
            
            const concurrencyLimit = 3;
            const delayBetweenBatches = 500;
            
            for (let i = 0; i < ids.length; i += concurrencyLimit) {
                const batch = ids.slice(i, i + concurrencyLimit);
                const batchResults = await Promise.all(batch.map(id => 
                    fetchMuById(id).catch(err => {
                        console.warn(`MU ${id} non caricata:`, err);
                        return null;
                    })
                ));
                
                batch.forEach((id, idx) => {
                    const mu = batchResults[idx];
                    if (mu) {
                        muDataCache.set(id, mu);
                    } else {
                        muDataCache.delete(id);
                    }
                });
                
                if (i + concurrencyLimit < ids.length) {
                    await new Promise(resolve => setTimeout(resolve, delayBetweenBatches));
                }
            }
            
            showToast(`✅ MU aggiornate`, 'success');
        }

        // ---------- PRELOAD NOMI UTENTI ----------
        async function preloadUserNames(userIds, showProgress = false) {
            const uniqueIds = [...new Set(userIds)];
            const toLoad = uniqueIds.filter(id => !userCache.has(id));
            
            if (toLoad.length === 0) return;
            
            if (showProgress) {
                showToast(`🔄 Caricamento ${toLoad.length} profili...`, 'info');
            }
            
            const concurrencyLimit = 3;  // ridotto per evitare 429
            const delayBetweenBatches = 500; // ms
            
            for (let i = 0; i < toLoad.length; i += concurrencyLimit) {
                const batch = toLoad.slice(i, i + concurrencyLimit);
                await Promise.all(batch.map(id => fetchUserById(id)));
                
                if (showProgress) {
                    const loaded = Math.min(i + concurrencyLimit, toLoad.length);
                    showToast(`🔄 Profili: ${loaded}/${toLoad.length}`, 'info');
                }
                
                if (i + concurrencyLimit < toLoad.length) {
                    await new Promise(resolve => setTimeout(resolve, delayBetweenBatches));
                }
            }
            
            if (showProgress) {
                showToast(`✅ ${toLoad.length} profili caricati`, 'success');
            }
        }
        function showToast(message, type = 'info') {
            const container = document.createElement('div');
            container.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#1a2e1a; border-left:4px solid #00ff88; color:#e0ffe0; padding:12px 20px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.5); z-index:10000;';
            container.textContent = message;
            document.body.appendChild(container);
            setTimeout(() => container.remove(), 3000);
        }
                async function fetchWithRetry(url, options, maxRetries = 3) {
            let delay = 1000; // 1 secondo iniziale
            for (let attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    const response = await fetch(url, options);
                    if (response.status === 429) {
                        console.warn(`429 ricevuto, tentativo ${attempt}/${maxRetries}. Attendo ${delay}ms...`);
                        await new Promise(resolve => setTimeout(resolve, delay));
                        delay *= 2; // backoff esponenziale
                        continue;
                    }
                    return response;
                } catch (err) {
                    if (attempt === maxRetries) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
            throw new Error(`Max retries (${maxRetries}) exceeded`);
        }
        // ---------- CALCOLI STATISTICHE ----------
   function getBattalionStats(battalion) {
    let totalMembers = 0;
    let totalWeeklyDamage = 0;
    let totalDamage = 0;
    let totalBounty = 0;
    let totalLevel = 0;

    battalion.muIds.forEach(muId => {
        const mu = muDataCache.get(muId);
        if (mu) {
            totalMembers += mu.members?.length || 0;
            totalWeeklyDamage += mu.rankings?.muWeeklyDamages?.value || 0;
            totalDamage += mu.rankings?.muDamages?.value || 0;
            totalBounty += mu.rankings?.muBounty?.value || 0;
        }
    });

    // Calcola livelli sommando quelli di tutti i membri del battaglione
    const allMembers = getAllMembersOfBattalion(battalion);
    allMembers.forEach(userId => {
        const user = userCache.get(userId);
        if (user) totalLevel += user.level || 0;
    });

    return { totalMembers, totalWeeklyDamage, totalDamage, totalBounty, totalLevel };
}
        function getAllMembersOfBattalion(battalion) {
            const membersSet = new Set();
            battalion.muIds.forEach(muId => {
                const mu = muDataCache.get(muId);
                if (mu && mu.members) {
                    mu.members.forEach(m => membersSet.add(m));
                }
            });
            return Array.from(membersSet);
        }

        // ---------- RENDERING LISTA BATTAGLIONI ----------
          function renderBattalionList() {
            if (battalions.length === 0) {
                battalionListDiv.innerHTML = '<div style="color:#6a8a6a; text-align:center; padding:20px;">Nessun battaglione. Creane uno!</div>';
                return;
            }
            battalionListDiv.innerHTML = battalions.map(b => {
                const stats = getBattalionStats(b);
                const selectedClass = (selectedBattalionId === b.id) ? 'selected' : '';
                return `
                    <div class="battalion-card ${selectedClass}" data-id="${b.id}">
                        <div class="battalion-name">
                            ${b.name}
                            <span style="font-size:12px; color:#8aaa8a;">${b.muIds.length} MU</span>
                        </div>
                        <div class="battalion-stats">
                            <div class="stat">
                                <span class="stat-label">Membri</span>
                                <span class="stat-value">${stats.totalMembers}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Livello</span>
                                <span class="stat-value">${stats.totalLevel}</span>
                            </div>
                            <div class="stat">
                                <span class="stat-label">Danno Sett.</span>
                                <span class="stat-value">${formatNumber(stats.totalWeeklyDamage)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.battalion-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.dataset.id;
                    selectBattalion(id);
                });
            });
        }
                function renderBalancePanel() {
            const container = document.getElementById('balanceListContainer');
            if (!container) return;
            
            if (battalions.length === 0) {
                container.innerHTML = '<div style="color:#6a8a6a; text-align:center; padding:20px;">Nessun battaglione.</div>';
                return;
            }
            
            const battalionsWithStats = battalions.map(b => {
                const stats = getBattalionStats(b);
                const muDetails = b.muIds.map(muId => {
                    const mu = muDataCache.get(muId);
                    let muLevel = 0;
                    if (mu && mu.members) {
                        mu.members.forEach(userId => {
                            const user = userCache.get(userId);
                            if (user) muLevel += user.level || 0;
                        });
                    }
                    return {
                        id: muId,
                        name: mu ? mu.name : muId.slice(-6),
                        members: mu ? mu.members?.length || 0 : 0,
                        level: muLevel
                    };
                });
                return {
                    ...b,
                    stats,
                    muDetails
                };
            });
            
            battalionsWithStats.sort((a, b) => a.stats.totalLevel - b.stats.totalLevel);
            
            let html = '';
            battalionsWithStats.forEach(b => {
                const isSelected = (selectedBattalionId === b.id);
                html += `
                    <div class="battalion-balance-item" data-id="${b.id}" style="${isSelected ? 'border-color:#00ff88;' : ''}">
                        <div class="battalion-balance-name">
                            ${b.name}
                            <span style="color:#00ff88;">Lv.${b.stats.totalLevel}</span>
                        </div>
                        <div class="battalion-balance-stats">
                            <span>👥 ${b.stats.totalMembers}</span>
                            <span>⚔️ ${formatNumber(b.stats.totalWeeklyDamage)}</span>
                        </div>
                        <div class="balance-mu-list">
                            ${b.muDetails.map(mu => `
                                <div class="balance-mu-item">
                                    <span>${mu.name}</span>
                                    <span>Lv.${mu.level} (${mu.members})</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            container.querySelectorAll('.battalion-balance-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = item.dataset.id;
                    selectBattalion(id);
                });
            });
        }
        async function selectBattalion(id) {
            selectedBattalionId = id;
            renderBattalionList();
            renderBalancePanel();
            await renderBattalionDetail(id);
        }

        // ---------- RENDERING DETTAGLIO BATTAGLIONE ----------

                    <tbody>`;

                    if (mu) {

                            mu.members.forEach(userId => {

                                if (user) muLevel += user.level || 0;

                        }

                html += `<div class="members-list">`;
memberNames.forEach(user => {

    html += `<a href="${APP_BASE}/user/${user.id}" target="_blank" class="badge" style="margin:4px; display:inline-flex; align-items:center;">${avatarHtml}${user.name} (Lv.${user.level || 0})</a>`;

            } else {

            document.getElementById('addMuToBattalionBtn')?.addEventListener('click', () => addMuToBattalion(battalion.id));
            document.getElementById('refreshBattalionMusBtn')?.addEventListener('click', async () => {

                await renderBattalionDetail(battalion.id);
                renderBattalionList();
            });
            
            document.querySelectorAll('tr.clickable').forEach(row => {
                row.addEventListener('click', (e) => {
                    if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;

                    showMuDetail(muId, battalion.id);
                });
            });

    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const muId = btn.dataset.muId;
        // Usa showMuDetail per visualizzare la lista membri completa e cliccabile
        showMuDetail(muId, battalion.id);

});
            
            document.querySelectorAll('.remove-mu-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();

        // ---------- GESTIONE BATTAGLIONI ----------
        function editBattalion(battalion) {
            const newName = prompt('Nuovo nome del battaglione:', battalion.name);
            if (newName) battalion.name = newName;
            const newChief = prompt('ID del Capo (userId):', battalion.chiefUserId);
            if (newChief !== null) battalion.chiefUserId = newChief;
            saveBattalions();
            renderBattalionList();
            renderBalancePanel();
            renderBattalionDetail(battalion.id);
        }

        function deleteBattalion(id) {
            if (confirm('Eliminare questo battaglione?')) {
                battalions = battalions.filter(b => b.id !== id);
                if (selectedBattalionId === id) selectedBattalionId = null;
                saveBattalions();
                renderBattalionList();
                renderBalancePanel();
                if (!selectedBattalionId) detailPanel.innerHTML = '<div style="text-align:center; color:#6a8a6a; padding:50px;">Seleziona un battaglione o creane uno nuovo</div>';
                else renderBattalionDetail(selectedBattalionId);
            }
        }

        async function addMuToBattalion(battalionId) {
            const muId = prompt('Inserisci l\'ID della MU da aggiungere:');
            if (!muId) return;
            const battalion = battalions.find(b => b.id === battalionId);
            if (battalion.muIds.includes(muId)) {
                alert('MU già presente nel battaglione.');
                return;
            }
            try {
                const mu = await fetchMuById(muId);
                muDataCache.set(muId, mu);
                battalion.muIds.push(muId);
                saveBattalions();
                renderBattalionList();
                renderBalancePanel();
                await renderBattalionDetail(battalionId);
            } catch (err) {
                alert('ID MU non valido o errore di rete.');
            }
        }

        function removeMuFromBattalion(battalionId, muId) {
            const battalion = battalions.find(b => b.id === battalionId);
            battalion.muIds = battalion.muIds.filter(id => id !== muId);
            saveBattalions();
            renderBattalionList();
            renderBalancePanel();
            renderBattalionDetail(battalionId);
        }

        // ---------- DETTAGLIO SINGOLA MU ----------
         async function showMuDetail(muId, battalionId) {
            const mu = muDataCache.get(muId);
            if (!mu) return;
            
            await preloadUserNames(mu.members || []);
            
            let totalMuLevel = 0;
            if (mu.members) {
                mu.members.forEach(userId => {
                    const user = userCache.get(userId);
                    if (user) totalMuLevel += user.level || 0;
                });
            }
            
            let html = `
                <div style="margin-bottom:20px;">
                    <button id="backToBattalionBtn" class="secondary">← Torna al Battaglione</button>
                </div>
                <h2><a href="${APP_BASE}/mu/${muId}" target="_blank">${mu.name}</a> <span class="badge">${mu._id}</span></h2>
                <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:20px; margin:20px 0;">
                    <div class="stat"><span class="stat-label">Membri</span><span class="stat-value">${mu.members?.length || 0}</span></div>
                    <div class="stat"><span class="stat-label">Livello Totale</span><span class="stat-value">${totalMuLevel}</span></div>
                    <div class="stat"><span class="stat-label">Danno Totale</span><span class="stat-value">${formatNumber(mu.rankings?.muDamages?.value || 0)}</span></div>
                    <div class="stat"><span class="stat-label">Danno Sett.</span><span class="stat-value">${formatNumber(mu.rankings?.muWeeklyDamages?.value || 0)}</span></div>
                    <div class="stat"><span class="stat-label">Bounty</span><span class="stat-value">${formatNumber(mu.rankings?.muBounty?.value || 0, true)}</span></div>
                    <div class="stat"><span class="stat-label">Terreno</span><span class="stat-value">${mu.rankings?.muTerrain?.value || 0}</span></div>
                </div>
                <div class="section-title">👥 Membri della MU (${mu.members?.length || 0})</div>
            `;
            if (mu.members && mu.members.length > 0) {
                const memberNames = await Promise.all(mu.members.map(id => fetchUserById(id)));
                html += `<div class="members-list">`;
                memberNames.forEach(user => {
                    const avatarHtml = user.avatarUrl ? `<img src="${user.avatarUrl}" style="width:20px;height:20px;border-radius:50%;border:1px solid #00ff88;margin-right:4px;object-fit:cover;">` : '';
                    html += `<a href="${APP_BASE}/user/${user.id}" target="_blank" class="badge" style="margin:4px; display:inline-flex; align-items:center;">${avatarHtml}${user.name} (Lv.${user.level || 0})</a>`;
                });
                html += `</div>`;
            } else {
                html += '<p style="color:#6a8a6a;">Nessun membro.</p>';
            }
            detailPanel.innerHTML = html;
            document.getElementById('backToBattalionBtn').addEventListener('click', () => {
                renderBattalionDetail(battalionId);
            });
        }
        // ---------- CREAZIONE NUOVO BATTAGLIONE ----------
        function createNewBattalion() {
            const name = prompt('Nome del nuovo battaglione:');
            if (!name) return;
            const chief = prompt('ID del Capo (opzionale):') || '';
            const newB = createBattalion(name, chief);
            battalions.push(newB);
            saveBattalions();
            renderBattalionList();
            selectBattalion(newB.id);
        }
                async function autoBalanceBattalions() {
            const countStr = prompt('In quanti battaglioni vuoi dividere le MU?', '2');
            if (!countStr) return;
            const battalionCount = parseInt(countStr, 10);
            if (isNaN(battalionCount) || battalionCount < 2) {
                alert('Inserisci un numero valido (minimo 2).');
                return;
            }

            const muListStr = prompt('Incolla la lista degli ID delle MU (separati da virgola, spazio o a capo):');
            if (!muListStr) return;

            const muIds = muListStr.split(/[\s,]+/).filter(id => id.trim().length > 0);
            if (muIds.length === 0) {
                alert('Nessun ID valido inserito.');
                return;
            }

            showToast(`🔄 Caricamento ${muIds.length} MU...`, 'info');

            const muDataList = [];
            for (const muId of muIds) {
                try {
                    let mu = muDataCache.get(muId);
                    if (!mu) {
                        mu = await fetchMuById(muId);
                        muDataCache.set(muId, mu);
                    }
                    let muLevel = 0;
                    if (mu.members) {
                        await preloadUserNames(mu.members);
                        mu.members.forEach(userId => {
                            const user = userCache.get(userId);
                            if (user) muLevel += user.level || 0;
                        });
                    }
                    muDataList.push({
                        id: muId,
                        name: mu.name || muId.slice(-6),
                        level: muLevel,
                        members: mu.members?.length || 0
                    });
                } catch (err) {
                    console.warn(`MU ${muId} non trovata, la salto.`);
                }
            }

            if (muDataList.length === 0) {
                alert('Nessuna MU valida trovata.');
                return;
            }

            muDataList.sort((a, b) => b.level - a.level);

            const newBattalions = [];
            for (let i = 0; i < battalionCount; i++) {
                newBattalions.push({
                    name: `Battaglione ${i + 1}`,
                    muIds: [],
                    totalLevel: 0
                });
            }

            for (const mu of muDataList) {
                let minIndex = 0;
                for (let i = 1; i < newBattalions.length; i++) {
                    if (newBattalions[i].totalLevel < newBattalions[minIndex].totalLevel) {
                        minIndex = i;
                    }
                }
                newBattalions[minIndex].muIds.push(mu.id);
                newBattalions[minIndex].totalLevel += mu.level;
            }

            let summary = `Distribuzione proposta per ${muDataList.length} MU in ${battalionCount} battaglioni:\n\n`;
            newBattalions.forEach((b, idx) => {
                summary += `${b.name}: ${b.muIds.length} MU, Livello Totale: ${b.totalLevel}\n`;
            });
            summary += '\nVuoi creare questi battaglioni? (quelli esistenti non verranno cancellati)';

            if (!confirm(summary)) return;

            for (const b of newBattalions) {
                if (b.muIds.length > 0) {
                    const newBattalion = createBattalion(b.name);
                    newBattalion.muIds = b.muIds;
                    battalions.push(newBattalion);
                }
            }
            saveBattalions();

            renderBattalionList();
            renderBalancePanel();
            if (battalions.length > 0 && !selectedBattalionId) {
                selectBattalion(battalions[0].id);
            }

            showToast(`✅ Creati ${newBattalions.filter(b => b.muIds.length > 0).length} battaglioni!`, 'success');
        }

        // ---------- UTILITY ----------
        function formatNumber(num, isDecimal = false) {
            if (num === null || num === undefined) return '0';
            if (isDecimal) return num.toFixed(2);
            if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }

        // ---------- INIZIALIZZAZIONE ----------
        async function init() {
            loadBattalions();
            renderBattalionList();
            renderBalancePanel();
            
            await refreshAllMuData();
            
            const allUserIds = new Set();
            battalions.forEach(b => {
                b.muIds.forEach(muId => {
                    const mu = muDataCache.get(muId);
                    if (mu && mu.members) {
                        mu.members.forEach(uid => allUserIds.add(uid));
                    }
                });
                if (b.chiefUserId) allUserIds.add(b.chiefUserId);
            });
            if (allUserIds.size > 0) {
                await preloadUserNames(Array.from(allUserIds), true);
            }
            
            renderBattalionList();
            renderBalancePanel();
            
            if (selectedBattalionId) {
                await renderBattalionDetail(selectedBattalionId);
            } else if (battalions.length > 0) {
                await selectBattalion(battalions[0].id);
            }
            
            newBtn.addEventListener('click', createNewBattalion);
            document.getElementById('autoBalanceBtn').addEventListener('click', autoBalanceBattalions);
            refreshAllBtn.addEventListener('click', async () => {
                await refreshAllMuData();
                const userIds = new Set();
                battalions.forEach(b => {
                    b.muIds.forEach(muId => {
                        const mu = muDataCache.get(muId);
                        if (mu && mu.members) mu.members.forEach(uid => userIds.add(uid));
                    });
                    if (b.chiefUserId) userIds.add(b.chiefUserId);
                });
                if (userIds.size > 0) await preloadUserNames(Array.from(userIds), true);
                renderBattalionList();
                renderBalancePanel();
                if (selectedBattalionId) await renderBattalionDetail(selectedBattalionId);
            });
        }

        function initRadar() {
    const canvas = document.getElementById('radar-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let angle = 0;
    function drawRadar() {
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        // Cerchi concentrici
        ctx.strokeStyle = '#00ff8860';
        ctx.lineWidth = 1;
        for (let i = 1; i <= 3; i++) {
            ctx.beginPath();
            ctx.arc(w/2, h/2, w/2 * i/3, 0, Math.PI * 2);
            ctx.stroke();
        }
        // Linee incrociate
        ctx.beginPath();
        ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
        ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
        ctx.strokeStyle = '#00ff8840';
        ctx.stroke();
        // Settore rotante
        ctx.beginPath();
        ctx.moveTo(w/2, h/2);
        ctx.arc(w/2, h/2, w/2, angle, angle + 0.5);
        ctx.closePath();
        ctx.fillStyle = '#00ff8820';
        ctx.fill();
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(w/2, h/2, w/2, angle, angle + 0.5);
        ctx.stroke();
        
        angle += 0.02;
        requestAnimationFrame(drawRadar);
    }
    drawRadar();
}

// Chiama initRadar() dopo il caricamento
window.addEventListener('load', () => {
    initRadar();
});
        init();
    })();
